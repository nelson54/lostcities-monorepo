server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
        grpc:
          endpoint: 0.0.0.0:4317
ingester:
  max_block_duration: 5m

storage:
  trace:
    backend: local                     # Use local disk for testing
    wal:
      path: /var/tempo/wal             # Write-ahead log path
    local:
      path: /var/tempo/blocks
